# AI大模型配置文件
# 支持OpenAI兼容格式的API

# API基础URL (例如: https://api.openai.com/v1 或其他兼容服务)
ai.api.url=https://api.openai.com/v1

# API Key (请替换为你自己的API Key)
ai.api.key=sk-your-api-key-here

# 模型名称 (例如: gpt-3.5-turbo, gpt-4, 或其他兼容模型)
ai.model=gpt-3.5-turbo

# 最大Token数
ai.max.tokens=2000

# 温度参数 (0-1, 越高越随机)
ai.temperature=0.7

# 是否启用AI功能
ai.enabled=false
